<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#cc0000">
<title>RE/MAX — Ingresar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1a0000,#cc0000 50%,#003DA5);padding:1rem}
.card{background:#fff;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center}
.logo b{font-size:38px;font-weight:800;color:#cc0000;letter-spacing:-1px;display:block;margin-bottom:4px}
.logo small{font-size:12px;color:#aaa;display:block;margin-bottom:.25rem}
.logo .version{font-size:10px;color:#ddd;display:block;margin-bottom:2rem}
.err{padding:.65rem .9rem;border-radius:7px;font-size:13px;margin-bottom:1rem;background:#fff5f5;color:#791F1F;border:0.5px solid #f09595;text-align:left}
.hidden{display:none}
.hint{margin-top:1.5rem;font-size:11px;color:#bbb;line-height:1.8}
.hint strong{color:#999}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #eee;border-top-color:#cc0000;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
#loading-msg{margin-top:1rem;font-size:13px;color:#999;min-height:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:.75rem;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;border:1px solid #e8e8e4;background:#fff;color:#1a1a1a;transition:background .15s;margin-top:.5rem}
.google-btn:hover{background:#f8f8f5}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <div class="logo">
    <b>RE/MAX</b>
    <small>Panel de gestión de agentes</small>
    <span class="version">v2.0</span>
  </div>

  <div id="err" class="err hidden"></div>
  <div id="loading-msg" class="hidden"><span class="spin"></span>Verificando acceso…</div>

  <button class="google-btn" onclick="loginGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar con Google
  </button>

  <p class="hint">
    🔐 El primer usuario que ingrese será <strong>Broker</strong><br>
    👤 Los siguientes serán Agentes<br>
    El Broker asigna roles desde Administración
  </p>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SUPABASE_URL = 'https://kwwhwlkfepfemutqzfcs.supabase.co';
var SUPABASE_KEY = 'sb_publishable_lgNzrQLBjfoKuSnN4zARNw_K8xcrlOU';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Si ya hay sesión, ir al dashboard
sb.auth.getSession().then(function(r){
  if(r.data.session) window.location.replace('dashboard.html');
});

// Escuchar cambio de auth (callback después del OAuth)
sb.auth.onAuthStateChange(function(event, session) {
  if(event === 'SIGNED_IN' && session) {
    window.location.replace('dashboard.html');
  }
});

async function loginGoogle() {
  showLoading(true);
  hideErr();
  var r = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      scopes: 'openid email profile https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/gmail.send',
      redirectTo: window.location.origin + '/dashboard.html',
      queryParams: {
        access_type: 'offline',
        prompt: 'consent'
      }
    }
  });
  if(r.error) {
    showLoading(false);
    showErr('Error al conectar con Google: ' + r.error.message);
  }
  // Si no hay error, Supabase redirige al proveedor automáticamente
}

function showErr(msg) {
  showLoading(false);
  var e = document.getElementById('err');
  e.textContent = msg;
  e.classList.remove('hidden');
}
function hideErr() { document.getElementById('err').classList.add('hidden'); }
function showLoading(v) {
  document.getElementById('loading-msg').classList.toggle('hidden', !v);
}
</script>
</body>
</html>

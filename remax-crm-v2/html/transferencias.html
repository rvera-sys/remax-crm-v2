<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE/MAX — Transferencias</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="tc"></div><div class="loading" id="loading">Cargando…</div>
<div id="sidebar-container"></div>
<div id="app" style="display:none">
<main class="main">
  <div class="ph">
    <div><div class="ph-title">↔️ Transferencias</div><div class="ph-sub">Pase de operaciones entre agentes</div></div>
    <button class="btn btn-primary" id="btn-new" onclick="openModal()" style="display:none">+ Solicitar transferencia</button>
  </div>
  <div class="card" style="margin-bottom:1rem">
    <div class="tabs">
      <button class="tab on" onclick="switchTab(this,'pendiente')">Pendientes</button>
      <button class="tab" onclick="switchTab(this,'aprobada')">Aprobadas</button>
      <button class="tab" onclick="switchTab(this,'rechazada')">Rechazadas</button>
    </div>
    <div id="list"></div>
  </div>
</main>
</div>
<div class="overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Solicitar transferencia</div><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="frow"><label>Operación a transferir *</label><select id="top"></select></div>
      <div class="frow"><label>Agente destino *</label><select id="tagent"></select></div>
      <div class="frow"><label>Motivo *</label><textarea id="treason" placeholder="¿Por qué se transfiere esta operación?"></textarea></div>
      <div class="frow"><label>% de comisión que retenés</label><input id="tsplit" type="number" value="0" min="0" max="100" placeholder="0"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="bsave" onclick="save()">Enviar solicitud</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared.js"></script>
<script>
var uid,all=[],agents=[],ops=[],curTab='pendiente';
var SL={pendiente:'badge-amber',aprobada:'badge-green',rechazada:'badge-red'};
(async function(){
  var r=await initPage('transferencias.html');if(!r)return;uid=r.user.id;
  if(!isBroker())document.getElementById('btn-new').style.display='';
  await load();
})();
async function load(){
  var[tr,ag,opR]=await Promise.all([
    db.transfers.list(),
    db.users.agents(),
    sb.from('operations').select('id,type,stage,seller:contacts!seller_contact_id(name)').eq('user_id',uid).is('deleted_at',null)
  ]);
  all=tr.data||[];agents=ag.data||[];ops=opR.data||[];
  render();
}
function switchTab(btn,tab){curTab=tab;document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');render();}
function render(){
  var list=all.filter(function(t){return t.status===curTab;});
  var el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">Sin transferencias '+curTab+'s.</div>';return;}
  el.innerHTML=list.map(function(t){
    var fromU=t.from_user||{},toU=t.to_user||{},op=t.operation||{};
    var isPending=t.status==='pendiente';
    return'<div style="padding:.85rem;border-radius:8px;background:var(--surface2);border:0.5px solid var(--border);margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">'
      +'<div style="font-size:13px;font-weight:500">'+(op.type==='venta'?'Venta':'Alquiler')+' · '+(STAGE_LABELS[op.stage]||op.stage)+'</div>'
      +'<span class="badge '+(SL[t.status]||'badge-gray')+'">'+t.status+'</span></div>'
      +'<div style="font-size:12px;color:var(--text2);margin-bottom:.25rem">De: <strong>'+fromU.name+'</strong> → Para: <strong>'+toU.name+'</strong></div>'
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:.5rem">'+t.reason+'</div>'
      +(t.commission_split_pct?'<div style="font-size:11px;color:var(--text3)">Comisión que retiene el agente original: '+t.commission_split_pct+'%</div>':'')
      +(isPending&&isBroker()?'<div style="display:flex;gap:8px;margin-top:.65rem">'
        +'<button class="btn btn-sm btn-green" data-id="'+t.id+'" onclick="approve(this)">✅ Aprobar</button>'
        +'<button class="btn btn-sm" style="color:var(--red);border-color:var(--red-mid)" data-id="'+t.id+'" onclick="reject(this)">❌ Rechazar</button>'
        +'</div>':'')
      +'</div>';
  }).join('');
}
function openModal(){
  var sel=document.getElementById('top');sel.innerHTML='<option value="">Seleccionar operación…</option>';
  ops.forEach(function(o){sel.innerHTML+='<option value="'+o.id+'">'+(o.seller&&o.seller.name||'—')+' · '+(STAGE_LABELS[o.stage]||o.stage)+'</option>';});
  var asel=document.getElementById('tagent');asel.innerHTML='<option value="">Seleccionar agente…</option>';
  agents.forEach(function(a){if(a.id!==uid)asel.innerHTML+='<option value="'+a.id+'">'+a.name+'</option>';});
  document.getElementById('treason').value='';document.getElementById('tsplit').value='0';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
async function save(){
  var opId=document.getElementById('top').value,agId=document.getElementById('tagent').value,reason=document.getElementById('treason').value.trim();
  if(!opId||!agId||!reason){toast('Completá todos los campos','error');return;}
  var btn=document.getElementById('bsave');btn.disabled=true;btn.textContent='Enviando…';
  var r=await db.transfers.insert({operation_id:opId,from_user_id:uid,to_user_id:agId,requested_by:uid,reason:reason,commission_split_pct:parseFloat(document.getElementById('tsplit').value)||0,transfer_date:hoy()});
  btn.disabled=false;btn.textContent='Enviar solicitud';
  if(r.error){toast('Error: '+r.error.message,'error');return;}
  // Mail al broker
  if(CRM.googleAccessToken){
    var broker=await sb.from('users').select('email,name').eq('role','broker').single();
    if(broker.data){
      var fromName=CRM.user.name,toAgent=agents.find(function(a){return a.id===agId;})||{};
      gmailAlertTransfer(broker.data.email,opId,fromName,toAgent.name||agId,reason);
    }
  }
  toast('Solicitud enviada al broker');closeModal();await load();
}
async function approve(btn){
  var id=btn.getAttribute('data-id');
  if(!confirm('¿Aprobar esta transferencia?'))return;
  var r=await db.transfers.approve(id,uid);
  if(r.error){toast('Error','error');return;}
  // Actualizar user_id de la operación
  var t=all.find(function(x){return x.id===id;});
  if(t)await sb.from('operations').update({user_id:t.to_user_id,transferred_from_user_id:t.from_user_id}).eq('id',t.operation_id);
  toast('Transferencia aprobada');await load();
}
async function reject(btn){
  var id=btn.getAttribute('data-id');
  var reason=prompt('Motivo del rechazo:');if(reason===null)return;
  var r=await db.transfers.reject(id,uid,reason);
  if(r.error){toast('Error','error');return;}
  toast('Transferencia rechazada');await load();
}
</script>
</body>
</html>
